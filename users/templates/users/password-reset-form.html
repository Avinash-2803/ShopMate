{% extends 'myapp/base.html' %}

{% block body %}
<div class="min-h-[80vh] flex items-center justify-center bg-slate-50 px-4 py-12">
    <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl p-8 md:p-10 border border-gray-100">
        
        <div class="mb-6 flex justify-center">
            <div class="rounded-2xl bg-indigo-50 p-4 border border-indigo-100">
                <svg class="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
        </div>

        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Set New Password</h1>
            <p class="text-gray-500 mt-2 text-sm">Ensure your new password is strong and unique.</p>
        </div>

        <form action="" method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label for="new_password1" class="block text-sm font-bold text-gray-700 ml-1">New Password</label>
                <div class="relative group">
                    <input type="password" name="new_password1" id="new_password1" required
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 focus:bg-white transition-all duration-200 outline-none placeholder-gray-400"
                        placeholder="••••••••">
                </div>
            </div>

            <div class="space-y-2">
                <label for="new_password2" class="block text-sm font-bold text-gray-700 ml-1">Retype your password</label>
                <div class="relative group">
                    <input type="password" name="new_password2" id="new_password2" required
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 focus:bg-white transition-all duration-200 outline-none placeholder-gray-400"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" 
                class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg shadow-indigo-100 transition-all duration-200 transform active:scale-[0.98] flex items-center justify-center gap-2">
                <span>Update Password</span>
                <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                </svg>
            </button>
        </form>

        <div class="mt-8 text-center text-xs text-gray-400">
            <p>Logged in elsewhere? Changing your password will sign you out of all other devices.</p>
        </div>
    </div>
</div>
{% endblock %}
