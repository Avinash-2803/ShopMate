{% extends 'myapp/base.html' %}

{% block body %}
<div class="min-h-[80vh] flex items-center justify-center bg-gray-50 px-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center transform transition-all hover:scale-[1.02]">
        
        <div class="mb-6 flex justify-center">
            <div class="rounded-full bg-green-100 p-4">
                <div class="rounded-full bg-green-500 p-3 shadow-lg shadow-green-200">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
            </div>
        </div>

        <h1 class="text-3xl font-extrabold text-gray-900 mb-2">
            Email Verified!
        </h1>
        <p class="text-gray-500 mb-8">
            Your account is now fully active. You can proceed to log in and access all features.
        </p>

        <a href="{% url 'login' %}" class="inline-block w-full py-4 px-8 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-2xl shadow-lg shadow-emerald-200 transition-all duration-200 active:transform active:scale-95">
            Proceed to Log In
        </a>

        <p class="mt-6 text-sm text-gray-400">
            We've sent a welcome email to your inbox.
        </p>
    </div>
</div>
{% endblock %}
