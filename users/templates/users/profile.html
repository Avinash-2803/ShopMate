{% extends 'myapp/base.html' %}

{% block body %}
<div class="min-h-screen bg-gray-50/50 py-12 px-4">
    <div class="max-w-2xl mx-auto">
        <div class="mb-8 flex items-center gap-6">
            <div class="h-20 w-20 bg-red-600 rounded-2xl flex items-center justify-center shadow-lg shadow-red-200">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
            </div>
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Account Settings</h1>
                <p class="text-gray-500 text-sm">Update your personal information and profile details.</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-8">
                <form method="POST" class="space-y-6 django-form-container">
                    {% csrf_token %}
                    
                    <div class="grid grid-cols-1 gap-y-6">
                        {{ user_form }}
                    </div>

                    <div class="pt-6 mt-6 border-t border-gray-50 flex items-center justify-between">
                        <p class="text-xs text-gray-400">Make sure to save changes before leaving.</p>
                        <button type="submit" class="px-8 py-3 bg-yellow-600 hover:bg-orange-700 text-white font-semibold rounded-xl shadow-md shadow-blue-100 transition-all active:scale-95">
                            Update Profile
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Targeting Django's auto-generated form fields */
    .django-form-container p {
        margin-bottom: 1.5rem;
    }
    .django-form-container label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #4b5563; /* gray-600 */
        margin-bottom: 0.5rem;
    }
    .django-form-container input, 
    .django-form-container select, 
    .django-form-container textarea {
        width: 100%;
        padding: 0.75rem 1rem;
        background-color: #f9fafb; /* gray-50 */
        border: 1px solid #e5e7eb; /* gray-200 */
        border-radius: 0.75rem;
        transition: all 0.2s;
        outline: none;
    }
    .django-form-container input:focus {
        background-color: #ffffff;
        border-color: #010713; /* blue-600 */
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }
</style>
{% endblock %}
