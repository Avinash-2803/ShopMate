{% extends 'myapp/base.html' %}

{% block body %}
<div class="min-h-[80vh] flex items-center justify-center bg-slate-50 px-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 text-center border border-gray-100">
        
        <div class="mb-8 flex justify-center">
            <div class="relative">
                <div class="absolute -inset-1 rounded-full bg-blue-100 animate-pulse"></div>
                <div class="relative rounded-full bg-blue-600 p-5 shadow-lg shadow-blue-200">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                </div>
            </div>
        </div>

        <h1 class="text-2xl font-bold text-gray-800 mb-4">
            Check your inbox
        </h1>

        <div class="space-y-4">
            <p class="text-gray-600 leading-relaxed">
                The verification email has been sent. Please click the link in the email to confirm your account.
            </p>
            
            <div class="bg-blue-50 border-l-4 border-blue-400 p-4 rounded-r-lg">
                <p class="text-sm text-blue-700 text-left">
                    <strong>Note:</strong> If you don't see it within a few minutes, please check your <b>Spam</b> folder.
                </p>
            </div>
        </div>

        <div class="mt-10 pt-6 border-t border-gray-100">
            <p class="text-sm text-gray-500 mb-4">Didn't receive the email?</p>
            
            <button class="text-blue-600 font-semibold hover:text-blue-800 transition-colors duration-200 underline-offset-4 hover:underline">
                Resend verification email
            </button>
        </div>
    </div>
</div>
{% endblock %}
