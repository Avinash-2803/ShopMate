{% extends 'myapp/base.html' %}

{% block body %}
<div class="min-h-[80vh] flex items-center justify-center bg-slate-50 px-4">
    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-10 md:p-12 border border-gray-100">
        
        <div class="mb-8 flex justify-center">
            <div class="rounded-3xl bg-amber-50 p-4 border border-amber-100">
                <svg class="w-10 h-10 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                </svg>
            </div>
        </div>

        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-gray-900 tracking-tight mb-3">Reset Password</h1>
            <p class="text-gray-500 text-sm leading-relaxed">
                Forgot your password? No worries. Enter your email below and we'll send you a recovery link.
            </p>
        </div>

        <form action="" method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label for="email" class="block text-sm font-bold text-gray-700 ml-1">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206"></path>
                        </svg>
                    </div>
                    <input type="email" name="email" id="email" required
                        class="w-full pl-11 pr-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:bg-white transition-all duration-200 outline-none placeholder-gray-400"
                        placeholder="name@company.com">
                </div>
            </div>

            <button type="submit" 
                class="w-full py-4 bg-gray-900 hover:bg-black text-white font-bold rounded-2xl shadow-xl transition-all duration-200 transform active:scale-[0.98] flex items-center justify-center gap-3">
                <span>Send Reset Link</span>
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                </svg>
            </button>
        </form>

        <div class="mt-10 text-center">
            <a href="{% url 'login' %}" class="text-sm font-semibold text-blue-600 hover:text-blue-700 transition-colors flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
